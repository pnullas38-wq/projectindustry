apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-backend
  labels:
    app: nexus
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexus-backend
  template:
    metadata:
      labels:
        app: nexus-backend
    spec:
      containers:
        - name: backend
          image: nexus/backend:1.0.0
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: nexus-config
---
apiVersion: v1
kind: Service
metadata:
  name: nexus-backend
spec:
  selector:
    app: nexus-backend
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexus-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexus-frontend
  template:
    metadata:
      labels:
        app: nexus-frontend
    spec:
      containers:
        - name: frontend
          image: nexus/frontend:1.0.0
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nexus-frontend
spec:
  selector:
    app: nexus-frontend
  ports:
    - port: 80
      targetPort: 80
  type: LoadBalancer
